services:
  postgres:
    image: postgres:17-alpine
    container_name: healthcare_system
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Y7vIfKlCqx
    ports:
      - "5454:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - healthcare_system_network

volumes:
  pgdata:

networks:
  healthcare_system_network:
    driver: bridge
